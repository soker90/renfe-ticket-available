name = "renfe-telegram-bot"
main = "src/index.ts"
compatibility_date = "2025-01-01"

[vars]
GITHUB_REPO = "soker90/renfe-ticket-available"
GITHUB_WORKFLOW = "check-tickets.yml"

# Cron Trigger: comprobar monitorizaciones cada 10 minutos
[triggers]
crons = ["*/10 * * * *"]

# Namespace KV para guardar el estado de las sesiones conversacionales (TTL 10 min)
# y las monitorizaciones activas (sin TTL, se borran manualmente o por expiración de fecha)
# Crear con: npx wrangler kv namespace create BOT_SESSIONS
# Sustituir el id por el devuelto por el comando anterior
[[kv_namespaces]]
binding = "BOT_SESSIONS"
id = "2bb79279f3404254b0f9d2df29d0d69e"
